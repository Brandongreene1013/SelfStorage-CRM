name: Supabase backup

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  backup:
    name: Encrypted CRM JSON export
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export CRM tables
        run: |
          set -euo pipefail
          mkdir -p backup-work
          BACKUP_OUTPUT_DIR="$PWD/backup-work" node scripts/export-supabase-json-backup.mjs

      - name: Encrypt backup
        env:
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${BACKUP_ENCRYPTION_PASSPHRASE:-}" ]; then
            echo "Missing GitHub secret: BACKUP_ENCRYPTION_PASSPHRASE" >&2
            exit 1
          fi

          stamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          tar -czf "storage-hunters-crm-json-${stamp}.tar.gz" -C backup-work .
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -in "storage-hunters-crm-json-${stamp}.tar.gz" \
            -out "storage-hunters-crm-json-${stamp}.tar.gz.enc" \
            -pass env:BACKUP_ENCRYPTION_PASSPHRASE

          rm -rf backup-work "storage-hunters-crm-json-${stamp}.tar.gz"
          echo "BACKUP_FILE=storage-hunters-crm-json-${stamp}.tar.gz.enc" >> "$GITHUB_ENV"

      - name: Upload encrypted backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error

      # Artifacts expire after 90 days; Mondays (and manual runs) also commit
      # the encrypted backup to the crm-backups branch, which never expires.
      - name: Keep a permanent copy on the crm-backups branch
        run: |
          set -euo pipefail

          if [ "$(date -u +%u)" != "1" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Not Monday and not a manual run — skipping permanent copy."
            exit 0
          fi

          git config user.name "crm-backup-bot"
          git config user.email "actions@users.noreply.github.com"

          if git fetch -q origin crm-backups; then
            git branch -f crm-backups FETCH_HEAD
          else
            git branch crm-backups "$(git commit-tree "$(git hash-object -t tree /dev/null)" -m 'Initialize CRM backup archive branch')"
          fi

          git worktree add ../backup-branch crm-backups
          cp "$BACKUP_FILE" ../backup-branch/
          cd ../backup-branch
          # Stop Vercel from building preview deployments of this data-only branch.
          printf '{\n  "git": { "deploymentEnabled": false }\n}\n' > vercel.json
          git add -A
          git commit -m "Encrypted CRM backup ${BACKUP_FILE}"
          git push origin crm-backups

      - name: Open an alarm issue if the backup failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "🚨 CRM backup FAILED on $(date -u +%Y-%m-%d)" \
            --body "The scheduled Supabase backup workflow failed. The CRM database is NOT being backed up until this is fixed. Run link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

